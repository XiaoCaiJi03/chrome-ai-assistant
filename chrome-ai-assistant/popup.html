<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      background: #1e1e2e;
      color: #cdd6f4;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }
    h2 {
      font-size: 16px;
      color: #cba6f7;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #181825;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #cba6f7;
    }
    textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .status.success { display: block; background: #1e3a2f; color: #a6e3a1; border: 1px solid #2e5a3f; }
    .status.error { display: block; background: #3a1e1e; color: #f38ba8; border: 1px solid #5a2e2e; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      background: #cba6f7;
      color: #1e1e2e;
      font-weight: 600;
    }
    .btn:hover { background: #b4befe; }
    .hint {
      font-size: 11px;
      color: #6c7086;
      margin-top: 12px;
      text-align: center;
    }
    .custom-endpoint { display: none; }
  </style>
</head>
<body>
  <h2>🤖 AI Assistant</h2>

  <div class="status" id="status"></div>

  <div class="field">
    <label>AI 供应商</label>
    <select id="provider">
      <option value="openai">OpenAI</option>
      <option value="deepseek">DeepSeek</option>
      <option value="minimax">MiniMax</option>
    </select>
  </div>

  <div class="field custom-endpoint" id="customEndpointField">
    <label>自定义 API 地址</label>
    <input type="url" id="customBaseUrl" placeholder="https://your-api.com/v1/chat/completions">
  </div>

  <div class="field">
    <label id="apiKeyLabel">API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
  </div>

  <div class="field">
    <label>模型</label>
    <select id="model"></select>
  </div>

  <div class="field">
    <label>自定义默认提示词（用于"自定义提示词"菜单）</label>
    <textarea id="customPrompt" placeholder="例如：请将以下内容改写为更正式的学术风格：\n\n"></textarea>
  </div>

  <button class="btn" id="saveBtn">保存设置</button>

  <div class="hint">
    选中文本 → 右键 → AI 助手 即可使用<br>
    API Key 仅存储在本地浏览器
  </div>

  <script src="popup.js"></script>
</body>
</html>
